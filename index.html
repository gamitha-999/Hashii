<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Master Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="main-container">
        
        <!-- Login Section -->
        <div id="login-section">
            <h1>Study Master Challenge</h1>
            <p class="subtitle">Can you get A+ in your exam?</p>
            <input type="text" id="player-name" placeholder="Enter Your Name" maxlength="20">
            <button id="join-btn">Join Game</button>
        </div>

        <!-- Waiting Room Section -->
        <div id="waiting-section" class="hidden">
            <h1>Waiting Room</h1>
            <div class="waiting-box">
                <p>Hello, <span id="display-name"></span>!</p>
                <div class="loader"></div>
                <p>Waiting for Admin to start the game...</p>
            </div>
        </div>

        <!-- Quiz Section -->
        <div id="quiz-section" class="hidden">
            <div class="quiz-header">
                <div class="timer">⏱️ <span id="time-left">20</span>s</div>
                <div class="score-display">Score: <span id="current-score">0</span></div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p id="question-number" style="margin-top: 10px; font-size: 0.8rem; color: #636e72;"></p>
            <div class="question-text" id="question-text">Question goes here?</div>
            <div class="options-container" id="options-container">
                <!-- Options will be injected here -->
            </div>
        </div>

        <!-- Results Section -->
        <div id="results-section" class="hidden">
            <h1>Game Over!</h1>
            <div class="results-msg" id="results-msg"></div>
            <p>Your Score: <span id="final-score"></span>/100</p>
            <div id="leaderboard-section">
                <h3>Top Students</h3>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Name</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Top 5 players -->
                    </tbody>
                </table>
            </div>
            <button id="play-again-btn" style="margin-top: 20px;">Exit Game</button>
        </div>

    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Game Scripts -->
    <script src="firebase-config.js"></script>
    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
