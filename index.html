<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Master Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Join Screen -->
        <section id="join-screen" class="screen active">
            <h1>🎓 Study Master</h1>
            <input id="name-input" type="text" placeholder="Enter Your Name">
            <button id="join-btn" class="btn primary">Join Quiz</button>
            <button class="btn" onclick="location.href='admin.html'">Admin</button>
        </section>

        <!-- Lobby Screen -->
        <section id="lobby-screen" class="screen">
            <h1>Waiting Room</h1>
            <p id="players-count">0 students joined</p>
            <ul id="players-list"></ul>
            <button id="leave-btn" class="btn danger">Leave</button>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen">
            <div class="stats">
                <span id="question-stage">Q 1/10</span>
                <span id="timer">⏱️ 20s</span>
            </div>
            <div id="progress-wrap"><div id="progress-bar"></div></div>
            <div id="question-text">Question goes here?</div>
            <div id="options" class="options"></div>
            <button id="leave-game-btn" class="btn danger" style="margin-top:20px">Exit</button>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen">
            <h1>Results</h1>
            <div id="result-summary" style="text-align:center; margin-bottom:20px"></div>
            <h3>🏆 Top 3 Students</h3>
            <table class="leaderboard" id="final-leaderboard">
                <thead><tr><th>Rank</th><th>Name</th><th>Score</th></tr></thead>
                <tbody></tbody>
            </table>
            <button id="back-lobby-btn" class="btn primary" style="margin-top:20px">Back to Home</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
