<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section class="screen active">
            <h1>Admin Panel</h1>
            <div id="room-status" style="text-align:center; margin-bottom:20px; font-weight:bold;">Status: Loading...</div>
            <button id="start-game" class="btn primary">Start Quiz</button>
            <button id="reset-game" class="btn danger">Reset Game</button>
            <button class="btn" onclick="location.href='index.html'">Back to Quiz</button>
            
            <h3 style="margin-top:20px">Players</h3>
            <ul id="players-list"></ul>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="admin.js"></script>
</body>
</html>
